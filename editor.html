<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decivoc Scribe Sandbox</title>
    <style>
        :root {
            --espresso: #1A120B;
            --isabelline: #F5F5F1;
            --burnt-umber: #8A3324;
            --deep-gold: #C0A080;
        }

        body {
            background-color: var(--espresso);
            color: var(--isabelline);
            font-family: 'Georgia', 'Palatino Linotype', 'Book Antiqua', serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 20px;
            border-bottom: 1px solid var(--burnt-umber);
            text-align: center;
            background: #261B12;
        }

        h1 {
            color: var(--deep-gold);
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #editor-container {
            flex-grow: 1;
            padding: 20px;
            display: flex;
        }

        textarea {
            width: 100%;
            height: 100%;
            background: transparent;
            color: var(--isabelline);
            border: none;
            outline: none;
            font-size: 1.2rem;
            line-height: 1.8;
            font-family: inherit;
            resize: none;
            caret-color: var(--deep-gold);
        }

        .controls {
            padding: 15px;
            background-color: #261B12;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #3d2b1d;
        }

        button {
            background-color: var(--burnt-umber);
            color: var(--isabelline);
            border: 1px solid #a84a3a;
            padding: 10px 20px;
            font-weight: bold;
            font-family: 'Georgia', serif;
        }
    </style>
</head>

<body>

<header>
    <h1>The Decivoc Scriptorium</h1>
</header>

<div id="editor-container">
    <textarea id="scribeArea" placeholder="Begin your work here..."></textarea>
</div>

<div class="controls">
    <button onclick="downloadSDVC()">Forge .sdvc</button>
    <span id="nodeStatus" style="color: var(--deep-gold);">Node 1.0</span>
</div>

<script>
    const scribeArea = document.getElementById('scribeArea');
    const nodeStatus = document.getElementById('nodeStatus');
    let currentLevel = [1, 0];

    // Starts the very first line
    scribeArea.value = "Node 1.0 ";

    scribeArea.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            const lines = scribeArea.value.split('\n');
            const lastLine = lines[lines.length - 1];

            // If the last word was 'Enter', go deeper (e.g. 1.0.1)
            if (lastLine.trim().endsWith('Enter')) {
                currentLevel.push(1);
            } else {
                // Otherwise increment the current level (e.g. 1.1)
                currentLevel[currentLevel.length - 1]++;
            }

            const nodeStr = currentLevel.join('.');
            scribeArea.value += "\nNode " + nodeStr + " ";
            nodeStatus.innerText = "Node " + nodeStr;
        }

        // Backspace Method: Snaps back a level
        if (e.key === 'Backspace') {
            const lines = scribeArea.value.split('\n');
            const lastLine = lines[lines.length - 1];
            const nodeHeader = "Node " + currentLevel.join('.') + " ";

            if (lastLine === nodeHeader && currentLevel.length > 2) {
                e.preventDefault();
                currentLevel.pop();
                currentLevel[currentLevel.length - 1]++;
                
                lines[lines.length - 1] = "Node " + currentLevel.join('.') + " ";
                scribeArea.value = lines.join('\n');
                nodeStatus.innerText = "Node " + currentLevel.join('.');
            }
        }
    });

    function downloadSDVC() {
        const text = scribeArea.value;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = 'script.sdvc';
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }
</script>
</body>
</html>
