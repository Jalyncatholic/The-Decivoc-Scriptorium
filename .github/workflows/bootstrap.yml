name: Bootstrap Gradle Wrapper
on: 
  workflow_dispatch: # This adds the "Run workflow" button in your Actions tab

jobs:
  generate-wrapper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the Scriptorium
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate the Gradle Wrapper
        run: |
          # Uses the system's local Gradle to forge your project's wrapper
          gradle wrapper --gradle-version 8.5

      - name: Cement the Wrapper in Repository
        run: |
          # Using the official GitHub Actions Bot identity for privacy
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Adding the essential Gradle files to your main repository
          git add gradlew gradlew.bat gradle/
          git commit -m "Forge: Cementing the Gradle Wrapper [Bot]"
          git push
          
