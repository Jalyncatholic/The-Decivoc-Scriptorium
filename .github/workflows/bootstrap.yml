name: Bootstrap Gradle Wrapper
on: 
  workflow_dispatch:

jobs:
  generate-wrapper:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout the Scriptorium
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate the Gradle Wrapper
        run: |
          # The --project-dir . ensures it stays in the root
          gradle wrapper --gradle-version 8.5 --project-dir .

      - name: Cement the Wrapper
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradlew gradlew.bat gradle/
          git commit -m "Forge: Cementing the Gradle Wrapper"
          git push
          
